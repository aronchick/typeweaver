name: Build & Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REMOTE_DIR: /opt/typeweaver
  SERVICE: typeweaver

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p typeweaver-cli

      - name: Run tests
        run: cargo test --all

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Provision remote directory & user
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} bash -s << 'REMOTE'
            set -euo pipefail
            useradd --system --shell /usr/sbin/nologin typeweaver 2>/dev/null || true
            mkdir -p /opt/typeweaver/.typeweaver
            chown -R typeweaver:typeweaver /opt/typeweaver
          REMOTE

      - name: Deploy binary
        run: |
          rsync -avz --progress \
            target/release/typeweaver-cli \
            -e "ssh -i ~/.ssh/deploy_key" \
            root@${{ secrets.DEPLOY_HOST }}:${{ env.REMOTE_DIR }}/typeweaver
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} \
            "chown typeweaver:typeweaver ${{ env.REMOTE_DIR }}/typeweaver && chmod +x ${{ env.REMOTE_DIR }}/typeweaver"

      - name: Deploy systemd service
        run: |
          scp -i ~/.ssh/deploy_key \
            deploy/typeweaver.service \
            root@${{ secrets.DEPLOY_HOST }}:/etc/systemd/system/${{ env.SERVICE }}.service
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} \
            "systemctl daemon-reload && systemctl enable ${{ env.SERVICE }} && systemctl restart ${{ env.SERVICE }}"

      - name: Deploy Caddy config
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} "mkdir -p /etc/caddy/sites"
          scp -i ~/.ssh/deploy_key \
            deploy/caddy-typeweaver.caddy \
            root@${{ secrets.DEPLOY_HOST }}:/etc/caddy/sites/typeweaver.caddy
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} \
            "caddy validate --config /etc/caddy/Caddyfile 2>/dev/null && caddy reload --config /etc/caddy/Caddyfile || true"

      - name: Health check
        run: |
          sleep 5
          curl -sf http://${{ secrets.DEPLOY_HOST }}:3500/okz    && echo "/okz OK"
          curl -sf http://${{ secrets.DEPLOY_HOST }}:3500/healthz && echo "/healthz OK"
          curl -sf http://${{ secrets.DEPLOY_HOST }}:3500/varz | head -5 && echo "/varz OK"

      - name: Smoke test (ingest fixtures)
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} \
            "/opt/typeweaver/typeweaver ingest /opt/typeweaver/.typeweaver --registry-root /opt/typeweaver/.typeweaver 2>/dev/null || true"
