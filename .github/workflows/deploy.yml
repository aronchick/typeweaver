name: Build & Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REMOTE_DIR: /opt/typeweaver
  SERVICE: typeweaver

concurrency:
  group: deploy-typeweaver
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --all

      - name: Build release binary
        run: cargo build --release -p typeweaver-cli

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Validate deploy target
        run: |
          set -euo pipefail
          host="${{ secrets.DEPLOY_HOST }}"
          user="${{ secrets.DEPLOY_USER }}"
          if [ -z "$host" ] || [ -z "$user" ]; then
            echo "DEPLOY_HOST or DEPLOY_USER secret is empty or missing"
            exit 1
          fi
          echo "Checking SSH reachability for ${user}@${host}:22"
          python3 -c 'import socket, sys; host = sys.argv[1]; s = socket.create_connection((host, 22), timeout=10); s.close(); print(f"SSH reachable on {host}:22")' "$host"

      - name: Set up SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Verify SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'whoami && hostname'

      - name: Provision remote directory
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'REMOTE'
            set -euo pipefail
            sudo useradd --system --shell /usr/sbin/nologin typeweaver 2>/dev/null || true
            sudo mkdir -p /opt/typeweaver/.typeweaver
            sudo chown -R typeweaver:typeweaver /opt/typeweaver
          REMOTE

      - name: Deploy binary
        run: |
          rsync -avz --progress \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            target/release/typeweaver-cli \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/typeweaver-cli"
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'REMOTE'
            set -euo pipefail
            sudo install -o typeweaver -g typeweaver -m 0755 ~/typeweaver-cli /opt/typeweaver/typeweaver
            rm -f ~/typeweaver-cli
          REMOTE

      - name: Deploy systemd service
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            deploy/typeweaver.service \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/typeweaver.service"
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'REMOTE'
            set -euo pipefail
            sudo install -m 0644 ~/typeweaver.service /etc/systemd/system/typeweaver.service
            rm -f ~/typeweaver.service
            sudo systemctl daemon-reload
            sudo systemctl enable typeweaver
            sudo systemctl restart typeweaver
          REMOTE

      - name: Detect Caddy config changes
        id: caddy_changes
        run: |
          set -euo pipefail
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            if git diff --quiet HEAD^ HEAD -- deploy/caddy-typeweaver.caddy; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Caddy config
        if: steps.caddy_changes.outputs.changed == 'true'
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            deploy/caddy-typeweaver.caddy \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/typeweaver.caddy"
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'REMOTE'
            set -euo pipefail
            sudo -n mkdir -p /etc/caddy/sites
            sudo -n install -d -o caddy -g caddy -m 0755 /var/log/caddy
            sudo -n touch /var/log/caddy/typeweaver.log
            sudo -n chown caddy:caddy /var/log/caddy/typeweaver.log
            sudo -n chmod 0644 /var/log/caddy/typeweaver.log
            sudo -n install -m 0644 ~/typeweaver.caddy /etc/caddy/sites/typeweaver.caddy
            rm -f ~/typeweaver.caddy
            sudo -n caddy validate --config /etc/caddy/Caddyfile
            sudo -n systemctl reload caddy
          REMOTE

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'REMOTE'
            set -euo pipefail
            sleep 5
            curl -sf --max-time 10 http://127.0.0.1:3500/okz    && echo "/okz OK"
            curl -sf --max-time 10 http://127.0.0.1:3500/healthz && echo "/healthz OK"
            curl -sf --max-time 10 http://127.0.0.1:3500/varz | head -5 && echo "/varz OK"
          REMOTE

      - name: Smoke test (ingest fixtures)
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'sudo -u typeweaver /opt/typeweaver/typeweaver ingest /opt/typeweaver/.typeweaver --registry-root /opt/typeweaver/.typeweaver 2>/dev/null || true'
